schema_version: 1
id: warden

identity:
  name_ja: ウォーデン
  name_en: Warden
  category: overworld_hostile
  family: sculk
  default_disposition: hostile
  dimensions:
    - overworld

source:
  primary_urls:
    - "https://minecraft.wiki/w/Warden"
    - "https://minecraft.wiki/w/Tutorial:Warden_farming"
    - "https://minecraft.wiki/w/Tutorial:Combat"
  extraction_notes:
    - "心音と Darkness を段階演出に使いたい"
    - "出現後は戦闘より離脱助言を優先する"
  last_reviewed: "2026-05-25"
  overall_confidence: medium

canonical:
  stats:
    health: 500
    armor: null
    size:
      width: 0.9
      height: 2.9
    attack_damage:
      easy: null
      normal: null
      hard: null

  spawn:
    light_rule:
      type: natural_shrieker_only
      max_block_light: null
    player_distance:
      min: null
      max: null
    group_size: 1
    special_cases:
      - "自然生成の sculk shrieker が 4 warning で召喚"
      - "出現時は地面からせり上がる間無敵"

  aggro:
    detection_range: null
    triggers:
      - type: vibration_or_smell
        target: player
        max_distance: null
        trigger_delay:
          game_ticks: 0
          confidence: medium
        break_on_lost_contact: false
    loses_aggro_conditions: []

  movement:
    primary_style: walk
    speed:
      qualitative: fast
      numeric_blocks_per_sec: null
    special_movement:
      - type: emerge
        purpose: spawn_entry
        trigger: summoned_by_shrieker
        confidence: high
      - type: sonic_boom
        purpose: ranged_punish
        trigger: target_unreachable
        confidence: medium
    pathing_notes:
      - "直接見えなくても音と振動で追跡し、近寄れないと sonic boom を使う"

  attacks:
    primary:
      type: melee
      range: close
    secondary:
      - type: sonic_boom
        range: far

  difficulty_overrides:
    easy: []
    normal: []
    hard: []

  special_behaviors:
    - id: darkness_aura
      effect: applies_darkness_to_nearby_players
      confidence: high
    - id: heartbeat_audio
      effect: chest_heartbeat_intensifies_with_presence
      confidence: medium
    - id: sound_tracking
      effect: tracks_vibrations_and_sounds
      confidence: high

  weaknesses:
    - silence
    - wool
    - disengage_early

  resistances:
    - shield_turtle
    - thin_cover_only

adapter_hints:
  visual_signals:
    - "warden_emerging"
    - "warden_roar"
    - "warden_sonic_charge"
  audio_signals:
    - "minecraft:entity.warden.heartbeat"
    - "minecraft:entity.warden.roar"
    - "minecraft:entity.warden.sonic_charge"
    - "minecraft:entity.warden.sonic_boom"
  derived_metrics:
    - "shrieker_warning_level"
    - "heartbeat_stage"
    - "darkness_recently_applied"
    - "warden_detected_player"
  must_detect:
    - audible_presence
    - visual_distance
    - visual_direction
  nice_to_have:
    - "sonic_boom_charge_started"

dogido:
  threat_class: tank
  priority: critical
  panic_policy: reveal_only
  rear_warning_range: 16
  panic_range: 7
  audio_name_safe: true
  callouts:
    seen:
      - "ウォーデンや！逃げろ逃げろ！！"
      - "見つかったら終わる、離れろ！"
    heard:
      - "なんやこの音"
      - "だんだん近うなっとらん？"
      - "……俺の心音ちゃうで"
      - "ドキドキドギド様よりドキドキしてるって、どんだけ怖がりやねん！"
    aftermath:
      - "うわああ……やった……やったで……お前マジで強いな……"
  notes:
    - "心音は段階的に certainty を上げる"
    - "出現直後だけ悲鳴を許可し、その後は静音行動と離脱案内を優先する"
    - "戦うより逃げる助言を基本にする"

quality:
  status: draft
  missing_fields:
    - "heartbeat_stage の区切り条件"
    - "shriek warning と spawn timing の最終マッピング"
