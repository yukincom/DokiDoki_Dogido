schema_version: 1
id: wither

identity:
  name_ja: ウィザー
  name_en: Wither
  category: overworld_hostile
  family: undead_boss
  default_disposition: hostile
  dimensions:
    - overworld
    - nether
    - end

source:
  primary_urls:
    - "https://minecraft.wiki/w/Wither"
    - "https://minecraft.wiki/w/Tutorial:Defeating_the_wither"
    - "https://minecraft.wiki/w/Tutorial:Combat"
  extraction_notes:
    - "プレイヤー召喚型のボスなので pre-summon reaction が重要"
    - "出現直後だけ悲鳴、その後は助言へ切り替える"
  last_reviewed: "2026-05-25"
  overall_confidence: medium

canonical:
  stats:
    health: 300
    armor: 4
    size:
      width: 0.9
      height: 3.5
    attack_damage:
      easy: null
      normal: null
      hard: null

  spawn:
    light_rule:
      type: player_constructed_boss
      max_block_light: null
    player_distance:
      min: null
      max: null
    group_size: 1
    special_cases:
      - "魂の砂または魂の土の T 字と頭蓋骨 3 個で召喚"
      - "召喚後しばらく無敵で、終了時に大爆発"

  aggro:
    detection_range: null
    triggers:
      - type: summoned
        target: player
        max_distance: null
        trigger_delay:
          game_ticks: 0
          confidence: high
        break_on_lost_contact: false
    loses_aggro_conditions: []

  movement:
    primary_style: fly
    speed:
      qualitative: fast
      numeric_blocks_per_sec: null
    special_movement:
      - type: hover
        purpose: ranged_pressure
        trigger: during_combat
        confidence: medium
      - type: explosive_release
        purpose: spawn_transition
        trigger: summon_complete
        confidence: high
    pathing_notes:
      - "空中から爆発する頭蓋骨を連射しつつ地形を壊しやすい"

  attacks:
    primary:
      type: explosive_projectile
      range: far
    secondary:
      - type: spawn_explosion
        range: close

  difficulty_overrides:
    easy: []
    normal: []
    hard: []

  special_behaviors:
    - id: spawn_invulnerability
      effect: invulnerable_for_brief_charge_up_after_summon
      confidence: high
    - id: wither_armor_phase
      effect: gains_projectile_resistance_below_half_health
      confidence: medium

  weaknesses:
    - smite
    - prepared_cover

  resistances:
    - fire
    - lava

adapter_hints:
  visual_signals:
    - "wither_summon_shape_candidate"
    - "wither_spawn_charge_up"
    - "wither_armor_phase"
  audio_signals:
    - "minecraft:entity.wither.ambient"
    - "minecraft:entity.wither.shoot"
    - "minecraft:entity.wither.spawn"
  derived_metrics:
    - "summon_imminent"
    - "spawn_invulnerable"
    - "half_health_armor_active"
  must_detect:
    - visual_distance
    - visual_direction
    - line_of_sight
  nice_to_have:
    - "skull_projectile_incoming"

dogido:
  threat_class: tank
  priority: critical
  panic_policy: reveal_only
  rear_warning_range: 16
  panic_range: 7
  audio_name_safe: true
  callouts:
    seen:
      - "出た！ウィザーや！"
      - "爆発くる、離れろ！"
    heard:
      - "えっ・・・何しとるん？"
      - "マジで呼ぶんかそれ・・・"
    aftermath:
      - "よし・・・もう二度と気軽に呼ばんといてな・・・"
  notes:
    - "召喚候補のブロック配置を見た段階でプレイヤー行動へツッコミを入れる"
    - "出現直後だけ悲鳴を許可し、その後は無敵時間や爆発への助言を優先する"

quality:
  status: draft
  missing_fields:
    - "半分以下の armor phase の実装条件詳細"
    - "頭蓋骨の色違いと危険度差を別表にするか未決"
